<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShopYourVapeX - Site en ligne</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 1080px;
        height: 1350px;
        background: #071111;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .poster {
        position: relative;
        width: 1080px;
        height: 1350px;
        overflow: hidden;
        color: #f8fffd;
        background:
          radial-gradient(circle at 50% 66%, rgba(255, 255, 255, 0.22), transparent 27%),
          radial-gradient(circle at 18% 18%, rgba(56, 232, 207, 0.22), transparent 26%),
          radial-gradient(circle at 90% 10%, rgba(255, 230, 109, 0.14), transparent 24%),
          linear-gradient(180deg, #071111 0%, #0d181c 48%, #0f504b 100%);
      }

      .poster::before {
        content: "";
        position: absolute;
        inset: 42px;
        border: 1.5px solid rgba(56, 232, 207, 0.28);
        border-radius: 36px;
      }

      .logo {
        position: absolute;
        top: 42px;
        left: 450px;
        width: 180px;
        height: 180px;
        object-fit: contain;
        filter: drop-shadow(0 20px 34px rgba(0, 0, 0, 0.42));
      }

      .brand {
        position: absolute;
        top: 230px;
        left: 90px;
        width: 900px;
        margin: 0;
        text-align: center;
        font-size: 31px;
        font-weight: 900;
        letter-spacing: 0;
      }

      h1 {
        position: absolute;
        top: 295px;
        left: 86px;
        width: 908px;
        margin: 0;
        text-align: center;
        font-size: 88px;
        line-height: 0.95;
        letter-spacing: 0;
      }

      .subtitle {
        position: absolute;
        top: 490px;
        left: 126px;
        width: 828px;
        margin: 0;
        text-align: center;
        color: rgba(248, 255, 253, 0.76);
        font-size: 31px;
        font-weight: 700;
        line-height: 1.18;
      }

      .url {
        position: absolute;
        top: 615px;
        left: 262px;
        width: 556px;
        height: 70px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        color: #061010;
        background: #38e8cf;
        font-size: 35px;
        font-weight: 900;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.24);
      }

      .product-halo {
        position: absolute;
        left: 96px;
        top: 742px;
        width: 888px;
        height: 360px;
        border-radius: 999px;
        background:
          radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.32), rgba(56, 232, 207, 0.18) 40%, transparent 72%);
        filter: blur(2px);
      }

      .product {
        position: absolute;
        object-fit: contain;
        filter: drop-shadow(0 34px 40px rgba(0, 0, 0, 0.42));
      }

      .rave {
        left: 70px;
        top: 780px;
        width: 350px;
        height: 360px;
        transform: rotate(-5deg);
      }

      .kanger {
        left: 360px;
        top: 736px;
        width: 360px;
        height: 430px;
        transform: rotate(2deg);
        z-index: 2;
      }

      .oxbar {
        left: 660px;
        top: 770px;
        width: 350px;
        height: 380px;
        transform: rotate(5deg);
      }

      .payments {
        position: absolute;
        left: 120px;
        bottom: 130px;
        width: 840px;
        height: 56px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(56, 232, 207, 0.24);
        border-radius: 999px;
        color: #f8fffd;
        background: rgba(0, 0, 0, 0.26);
        font-size: 23px;
        font-weight: 850;
      }

      .fineprint {
        position: absolute;
        left: 110px;
        bottom: 80px;
        width: 860px;
        margin: 0;
        text-align: center;
        color: rgba(248, 255, 253, 0.68);
        font-size: 24px;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <main class="poster" aria-label="Annonce ShopYourVapeX">
      <img class="logo" src="../shop-your-vapex-logo.png" alt="ShopYourVapeX" />
      <p class="brand">SHOPYOURVAPEX</p>
      <h1>Notre site est en ligne</h1>
      <p class="subtitle">Commandez vos vapes dès maintenant à Kinshasa sur</p>
      <div class="url">shopyourvapex.com</div>
      <div class="product-halo"></div>
      <img class="product rave" src="https://media.vaping360.com/images/vozol-rave-40000-efcdbd2e.webp?MaxHeight=500&amp;MaxWidth=500&amp;imageType=Standard" alt="" />
      <img class="product kanger" src="../products/kangertech-50k-transparent.png" alt="" />
      <img class="product oxbar" src="../products/oxbar-45k-transparent.png" alt="" />
      <div class="payments">M-Pesa +243 837 933 422 • Orange Money +243 892 379 019</div>
      <p class="fineprint">Livraison disponible • Achat réservé aux 18+ uniquement</p>
    </main>
  </body>
</html>
