<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShopYourVapeX - Site en ligne</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 1080px;
        height: 1350px;
        background: #f8fffd;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .poster {
        position: relative;
        width: 1080px;
        height: 1350px;
        overflow: hidden;
        color: #101617;
        background:
          radial-gradient(circle at 20% 16%, rgba(56, 232, 207, 0.26), transparent 24%),
          radial-gradient(circle at 86% 14%, rgba(255, 230, 109, 0.22), transparent 22%),
          radial-gradient(circle at 50% 70%, rgba(36, 216, 199, 0.3), transparent 30%),
          linear-gradient(180deg, #ffffff 0%, #f3fbf8 48%, #d9f7f0 100%);
      }

      .poster::before {
        content: "";
        position: absolute;
        inset: 42px;
        border: 1.5px solid rgba(6, 16, 16, 0.1);
        border-radius: 36px;
      }

      .logo {
        position: absolute;
        top: 42px;
        left: 450px;
        width: 180px;
        height: 180px;
        object-fit: contain;
        filter: drop-shadow(0 18px 26px rgba(0, 0, 0, 0.18));
      }

      .brand {
        position: absolute;
        top: 230px;
        left: 90px;
        width: 900px;
        margin: 0;
        text-align: center;
        font-size: 31px;
        font-weight: 900;
        letter-spacing: 0;
      }

      h1 {
        position: absolute;
        top: 295px;
        left: 86px;
        width: 908px;
        margin: 0;
        text-align: center;
        font-size: 88px;
        line-height: 0.95;
        letter-spacing: 0;
      }

      .subtitle {
        position: absolute;
        top: 490px;
        left: 126px;
        width: 828px;
        margin: 0;
        text-align: center;
        color: #526365;
        font-size: 31px;
        font-weight: 700;
        line-height: 1.18;
      }

      .url {
        position: absolute;
        top: 615px;
        left: 262px;
        width: 556px;
        height: 70px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        color: #061010;
        background: #38e8cf;
        font-size: 35px;
        font-weight: 900;
        box-shadow: 0 24px 48px rgba(6, 16, 16, 0.14);
      }

      .product-halo {
        position: absolute;
        left: 96px;
        top: 742px;
        width: 888px;
        height: 360px;
        border-radius: 999px;
        background:
          radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.9), rgba(56, 232, 207, 0.2) 42%, transparent 72%);
        filter: blur(2px);
      }

      .product {
        position: absolute;
        object-fit: contain;
        filter: drop-shadow(0 34px 38px rgba(6, 16, 16, 0.24));
      }

      .rave {
        left: 70px;
        top: 780px;
        width: 350px;
        height: 360px;
        transform: rotate(-5deg);
      }

      .kanger {
        left: 360px;
        top: 736px;
        width: 360px;
        height: 430px;
        transform: rotate(2deg);
        z-index: 2;
      }

      .oxbar {
        left: 666px;
        top: 780px;
        width: 344px;
        height: 360px;
        transform: rotate(5deg);
        mix-blend-mode: multiply;
        filter: none;
      }

      .payments {
        position: absolute;
        left: 120px;
        bottom: 130px;
        width: 840px;
        height: 56px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(6, 16, 16, 0.1);
        border-radius: 999px;
        color: #101617;
        background: rgba(255, 255, 255, 0.72);
        font-size: 23px;
        font-weight: 850;
        box-shadow: 0 18px 34px rgba(6, 16, 16, 0.1);
      }

      .fineprint {
        position: absolute;
        left: 110px;
        bottom: 80px;
        width: 860px;
        margin: 0;
        text-align: center;
        color: #526365;
        font-size: 24px;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <main class="poster" aria-label="Annonce ShopYourVapeX">
      <img class="logo" src="../shop-your-vapex-logo.png" alt="ShopYourVapeX" />
      <p class="brand">SHOPYOURVAPEX</p>
      <h1>Notre site est en ligne</h1>
      <p class="subtitle">Commandez vos vapes dès maintenant à Kinshasa sur</p>
      <div class="url">shopyourvapex.com</div>
      <div class="product-halo"></div>
      <img class="product rave" src="https://media.vaping360.com/images/vozol-rave-40000-efcdbd2e.webp?MaxHeight=500&amp;MaxWidth=500&amp;imageType=Standard" alt="" />
      <img class="product kanger" src="../products/kangertech-50k-transparent.png" alt="" />
      <img class="product oxbar" src="https://image.vapesourcing.uk/imagecache/800/images/202602/watermelon-ice-oxbar-tri-fusion-45k.jpg" alt="" />
      <div class="payments">M-Pesa +243 837 933 422 • Orange Money +243 892 379 019</div>
      <p class="fineprint">Livraison disponible • Achat réservé aux 18+ uniquement</p>
    </main>
  </body>
</html>
